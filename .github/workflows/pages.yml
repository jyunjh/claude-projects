name: Deploy to GitHub Pages

# 公開するツールだけを GitHub Pages に配信する（他ツールは配信しない）。
#   ルート:            jidokan-calendar（従来どおり）
#   /mansion-finder/:  マンション検索（勝どき・晴海）
# main への push で自動デプロイ。手動実行も可。
on:
  push:
    branches: [main]
    paths:
      - "jidokan-calendar/**"
      - "mansion-finder/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: サイトを組み立て（ルート=児童館カレンダー, /mansion-finder/=マンション検索）
        run: |
          mkdir -p _site/mansion-finder
          cp -r jidokan-calendar/. _site/
          cp mansion-finder/index.html mansion-finder/app.js mansion-finder/styles.css _site/mansion-finder/
          cp -r mansion-finder/data _site/mansion-finder/data
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
