name: Deploy 児童館カレンダー to GitHub Pages

# jidokan-calendar フォルダだけを GitHub Pages に公開する（他ツールは配信しない）。
# main への push で自動デプロイ。手動実行も可。
on:
  push:
    branches: [main]
    paths:
      - "jidokan-calendar/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: jidokan-calendar
      - id: deployment
        uses: actions/deploy-pages@v4
